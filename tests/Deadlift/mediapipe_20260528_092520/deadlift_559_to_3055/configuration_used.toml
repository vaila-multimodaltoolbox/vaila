[scientific_robustness]
# ================================================================
# SCIENTIFIC ROBUSTNESS PARAMETERS (Kalman + Optical Flow) - v0.9.0
# ================================================================
# Kalman Filter: Predicts motion when tracking is lost.
track_process_noise = 1.0       # Process noise (model uncertainty)
track_measurement_noise = 0.1   # Base measurement noise (sensor uncertainty)
max_pred_gap = 10              # Max frames to predict before declaring a gap
# Optical Flow: Tracks points when MediaPipe confidence is low.
optical_flow_threshold = 0.15    # Max error for optical flow tracking
# Gap Reconstruction: Fills true gaps (offline).
enable_gap_reconstruction = true # Enable offline gap reconstruction
max_reconstruction_gap = 10      # Max gap size to fill (frames)

